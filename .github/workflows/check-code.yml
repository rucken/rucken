name: Check code

on:
  push:
    branches:
      - 'master'
      - 'develop'
      - 'feature/**'
    tags-ignore:
      - v*

jobs:
  check-code:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 23.11.1 to publish to npmjs.org
        uses: actions/setup-node@v1
        with:
          node-version: '23.11.1'
          registry-url: 'https://registry.npmjs.org'

      - uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install Packages
        run: npm i

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test
        env:
          CI: true

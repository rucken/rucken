name: Publish

on:
  push:
    tags:
      - v*
  workflow_dispatch:
    branches:
      - master

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 23.11.1 to publish to npmjs.org
        uses: actions/setup-node@v1
        with:
          node-version: '23.11.1'
          registry-url: 'https://registry.npmjs.org'

      - name: Install Packages
        run: npm i

      - name: Build
        run: npm run build

      - name: Test
        if: "!contains(github.event.head_commit.message, '[skip test]')"
        run: npm run test
        env:
          CI: true

      - name: Generate Release Body
        run: npx extract-changelog-release > RELEASE_BODY.md

      - name: Publish to NPM
        run: |
          set +e
          max_retries=3
          retry_count=0
          while [ $retry_count -lt $max_retries ]; do
            error_output=$(npm run publish 2>&1)
            exit_code=$?
            if [ $exit_code -eq 0 ]; then
              echo "Publish succeeded on attempt $((retry_count + 1))"
              set -e
              exit 0
            fi
            retry_count=$((retry_count + 1))
            echo "Publish failed on attempt $retry_count with exit code $exit_code"
            echo "Error output:"
            echo "$error_output"
            if [ $retry_count -lt $max_retries ]; then
              echo "Retrying in 30 seconds..."
              sleep 30
            fi
          done
          echo "Publish failed after $max_retries attempts"
          exit 1
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          bodyFile: 'RELEASE_BODY.md'
          token: ${{ secrets.GITHUB_TOKEN }}
